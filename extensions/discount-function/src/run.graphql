query Input {
  cart {
    lines {
      id
      quantity
      attribute(key: "_pumper_bundle_id") {
        value
      }
      giftAttr: attribute(key: "_pumper_gift_id") { value }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product { id }
        }
      }
      cost {
        amountPerQuantity { amount }
      }
    }
  }
  shop {
    metafield(namespace: "pumper", key: "config") {
      value
    }
  }
  discountNode {
    metafield(namespace: "$app:discount-function", key: "function-configuration") {
      jsonValue
    }
  }
}
