name = "bundler-admin"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./build/client"

[vars]
SHOPIFY_APP_URL = "https://bundler.deepseatools.in"
SCOPES = "write_products,read_orders,write_orders,read_discounts,write_discounts,read_themes,write_metaobjects,read_inventory,read_locales,read_markets,write_customers"

# Secrets via `wrangler pages secret put` (already set):
# - SHOPIFY_API_KEY
# - SHOPIFY_API_SECRET
# - SHOPIFY_WEBHOOK_SECRET
# - DATABASE_ENCRYPTION_KEY  (32-byte hex; AES-GCM key for token encryption in KV)
# - CRON_TOKEN              (random string; guards /api/cron/aggregate)

[[d1_databases]]
binding = "DB"
database_name = "bundler-prod"
database_id = "d464f2ae-af1d-45f0-a8d0-f63e9c32e9ec"
migrations_dir = "drizzle/migrations"

[[kv_namespaces]]
binding = "SESSIONS"
id = "4d9edb7231e34134a853ee17a75a8db6"

[[kv_namespaces]]
binding = "SHOP_SETTINGS_CACHE"
id = "0c09056732f74254a1d5501e381ed150"

[[r2_buckets]]
binding = "WIDGET_ASSETS"
bucket_name = "bundler-widget-assets"

# Per-shop rate limiting for unauthenticated storefront endpoints lives in
# the KV-backed helper at apps/admin/app/lib/rate-limit.ts. Cloudflare Pages
# doesn't support [[unsafe.bindings]] for the native Rate Limiting API, so
# we approximate it with KV counters bucketed by minute.

# Queue producer/consumer deferred to Phase 6 (requires Workers Paid plan):
# [[queues.producers]]
# binding = "ANALYTICS_QUEUE"
# queue = "bundler-analytics"
# [[queues.consumers]]
# queue = "bundler-analytics"
# max_batch_size = 100
# max_batch_timeout = 30

# Analytics Engine binding deferred to Phase 6 (must be enabled in dashboard first):
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "bundler_events"

# Cron triggers configured in Cloudflare dashboard for Pages projects
# (added in Phase 6 when first scheduled handler is implemented)
