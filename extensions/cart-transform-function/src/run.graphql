query Input {
  cart {
    lines {
      id
      quantity
      bundleAttr: attribute(key: "_pumper_bundle_id") { value }
      giftAttr: attribute(key: "_pumper_gift_id") { value }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          title
          product { id title }
        }
      }
      cost {
        amountPerQuantity { amount currencyCode }
      }
    }
  }
}
