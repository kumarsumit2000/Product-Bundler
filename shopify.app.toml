name = "Product Bundler"
client_id = "5d79beeba3a18a8232164a38b3a5602d"
application_url = "https://bundler.deepseatools.in"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,write_discounts,read_discounts,read_themes,write_metaobjects,read_metaobjects,read_inventory,read_locales,read_markets"

[auth]
redirect_urls = [
  "https://bundler.deepseatools.in/auth/callback"
]

[webhooks]
api_version = "2026-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  # orders/paid requires Protected Customer Data approval. Re-enable after
  # approving in Partners dashboard → Configuration → Protected customer data.
  # [[webhooks.subscriptions]]
  # topics = ["orders/paid"]
  # uri = "/webhooks/orders/paid"

  [[webhooks.subscriptions]]
  topics = ["collections/update"]
  uri = "/webhooks/collections/update"

  [webhooks.privacy_compliance]
  customer_deletion_url = "https://bundler.deepseatools.in/webhooks/customers/redact"
  customer_data_request_url = "https://bundler.deepseatools.in/webhooks/customers/data-request"
  shop_deletion_url = "https://bundler.deepseatools.in/webhooks/shop/redact"

[build]
automatically_update_urls_on_dev = true
dev_store_url = "deepseatools.myshopify.com"
