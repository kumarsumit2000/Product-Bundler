query Input {
  cart {
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          product { id }
        }
      }
    }
    deliveryGroups {
      deliveryOptions {
        handle
      }
    }
  }
  shop {
    metafield(namespace: "pumper", key: "config") {
      value
    }
  }
}
